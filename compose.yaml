services:

  # ── Infrastructure ───────────────────────────────────────────────────────────

  redis:
    image: redis/redis-stack:latest
    restart: unless-stopped
    ports:
      - "6379:6379"
      - "8001:8001"   # RedisInsight UI
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:3-management
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: myuser
      RABBITMQ_DEFAULT_PASS: secret
    ports:
      - "5672:5672"
      - "15672:15672"  # Management UI → http://localhost:15672
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 15s
      timeout: 10s
      retries: 5

  # MinIO is NOT run by this file — it runs on a separate host. Point the
  # backend at it via MINIO_URL / MINIO_ACCESS_KEY / MINIO_SECRET_KEY / MINIO_BUCKET
  # in the backend's .env (see Back end/.env.example).

  # ── Backend (Spring Boot) ────────────────────────────────────────────────────

  backend:
    build:
      context: ./Back end
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "8080:8080"
    env_file:
      - "./Back end/.env"   # DB_PASSWORD, JWT_SECRET, INTEGRATION_ENCRYPTION_KEY, MAIL_PASSWORD
    environment:
      # Supabase — env_file has DB_URL= (empty), which would override Spring Boot's
      # default. Explicitly set both here so the correct Supabase URL is always used.
      DB_URL: jdbc:postgresql://aws-0-eu-west-1.pooler.supabase.com:5432/postgres
      DB_USERNAME: postgres.jyzpcvosismwilptumpp

      # Redis (container)
      REDIS_HOST: redis
      REDIS_PORT: 6379

      # RabbitMQ (container)
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USERNAME: myuser
      RABBITMQ_PASSWORD: secret

      # MinIO — runs on a separate host, not in this compose file. MINIO_URL
      # (and MINIO_ACCESS_KEY/MINIO_SECRET_KEY/MINIO_BUCKET, MINIO_PUBLIC_URL if
      # needed) come from ./Back end/.env via env_file above — do not hardcode
      # a value here, it would override the real one.

      # URLs
      BACKEND_URL: https://api.flowmerce.tech
      FRONTEND_URL: https://flowmerce.tech

      # Mail sender (env_file has MAIL_USERNAME= empty — set default here)
      MAIL_USERNAME: ka.mahrous@gmail.com

      # Admin (env_file has ADMIN_EMAIL= empty)
      ADMIN_EMAIL: admin@flowmerce.com

      # Upload dir inside container
      UPLOAD_DIR: /app/uploads
    depends_on:
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    volumes:
      - uploads_data:/app/uploads
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/api/v1/actuator/health || exit 1"]
      interval: 20s
      timeout: 10s
      retries: 10
      start_period: 90s

  # ── Frontend (Next.js) ───────────────────────────────────────────────────────

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: http://localhost:8080/api/v1
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000 || exit 1"]
      interval: 20s
      timeout: 10s
      retries: 5
      start_period: 30s

# ── Named volumes ─────────────────────────────────────────────────────────────

volumes:
  redis_data:
  rabbitmq_data:
  uploads_data: