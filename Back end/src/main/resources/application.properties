server.servlet.context-path=/api/v1

# Diagnostics: web-expose threaddump (and loggers) so a live hang can be
# inspected via GET /api/v1/actuator/threaddump instead of guessing from logs
# — a thread dump shows the exact stack frame a stuck request is blocked in.
# Dev-only convenience; tighten or remove before any real deployment.
management.endpoints.web.exposure.include=health,threaddump,loggers

# File uploads
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=12MB
app.upload.dir=${UPLOAD_DIR:uploads}

spring.sql.init.platform=postgres
# Deploy-ready: defaults point at the Supabase instance, via the Supavisor session
# pooler (not the direct db.<ref>.supabase.co host) — that host is IPv6-only, which
# Docker containers (and some networks) can't route to, failing with
# "Network is unreachable". The pooler is IPv4-reachable and needs the
# project-qualified username (postgres.<project-ref>) instead of plain "postgres".
# Override per-environment via DB_URL/DB_USERNAME.
spring.datasource.url=${DB_URL:jdbc:postgresql://aws-0-eu-west-1.pooler.supabase.com:5432/postgres}
spring.datasource.username=${DB_USERNAME:postgres.jyzpcvosismwilptumpp}
# SEC-1: password comes from the environment only — NO inline default, so the live secret is never committed.
spring.datasource.password=${DB_PASSWORD}

spring.datasource.driver-class-name=org.postgresql.Driver
# Bound how long a query can hang on a flaky network leg to the remote Supabase
# DB. pgjdbc defaults both to 0 (no limit), so a dropped/stalled connection can
# block a query for minutes (bounded only by OS-level TCP retransmission)
# instead of failing fast with a clear SQLException.
spring.datasource.hikari.data-source-properties.connectTimeout=10
spring.datasource.hikari.data-source-properties.socketTimeout=15
# Capped below Supabase's Supavisor *session* pooler limit (free tier:
# pool_size=15 sessions, shared across every client connected to the project —
# not just this app). Going over it doesn't queue gracefully; the pooler
# rejects new sessions outright with "FATAL: max clients reached in session
# mode", which surfaces as Hikari connection-validation failures and stuck
# health checks. 10 leaves headroom for other sessions (psql, another app
# instance, etc.) against the same project.
# NOTE: this was 20 when connecting directly to db.<ref>.supabase.co, which
# has no such cap — re-raise it only if moving back to a direct/unpooled
# connection, or to Supavisor's *transaction* pooler (port 6543), which scales
# differently.
spring.datasource.hikari.maximum-pool-size=10
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=true
# Off: connections were held open through view rendering/serialization, not
# just the @Transactional method body, extending how long each request holds
# a pool slot. All endpoints already return DTOs built inside the
# transaction, not lazy entities, so there's nothing for a view to lazy-load.
spring.jpa.open-in-view=false
# validate: checks the schema matches the entities but never modifies it.
# Protects the shared Supabase DB from accidental data loss on restart — change
# entities → run a real migration (or a one-off ddl-auto=update run), don't
# rely on Hibernate auto-DDL here.
spring.jpa.hibernate.ddl-auto=validate
spring.docker.compose.enabled=false

# Disabled so the schema (and all test data) only resets on a deliberate
# stop/restart of the app, not on every classpath-change hot-reload.
spring.devtools.restart.enabled=false
# NOTE: Spring Boot 4 uses Jackson 3 (tools.jackson.*) which serializes java.time
# as ISO-8601 by default — no property needed (write-dates-as-timestamps is invalid in Jackson 3).

# JWT
# SEC-1: secret externalized with NO inline default — app fails fast if JWT_SECRET is unset.
# Generate a >=256-bit value, e.g.:  openssl rand -base64 48
jwt.secret=${JWT_SECRET}
jwt.expiration-ms=${JWT_EXPIRY:86400000}

# Admin seed (override in production via env vars)
app.admin.email=${ADMIN_EMAIL:admin@flowmerce.com}
app.admin.password=${ADMIN_PASSWORD:ChangeMe!2026}

app.base-url=${BACKEND_URL:http://localhost:8080}
# DOC-6: driven by FRONTEND_URL env var so CORS and email links work in containers.
app.frontend-url=${FRONTEND_URL:http://localhost:3000}

# Mail
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME:ka.mahrous@gmail.com}
# SEC-1: real Gmail app password externalized with NO inline default. Rotate the old one — it was committed.
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
# No timeout = infinite wait by default; bound it so a stuck SMTP handshake
# can't hold the @Async email thread (or, pre-@Async, the request thread) forever.
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000

# Redis
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}
# No timeout = Lettuce's own 60s default per command. RateLimitFilter runs on
# every request before the controller/DB are ever touched; a slow/hung Redis
# command stalls there silently (it only fail-opens on a thrown exception, not
# on a command that just hasn't returned yet). Bound it so a Redis hiccup
# surfaces (and fails open) in seconds, not up to a minute.
spring.data.redis.timeout=3000
spring.data.redis.connect-timeout=3000

# Storefront cache TTL in minutes (default 30 min)
storefront.cache.ttl-minutes=${SF_CACHE_TTL_MINUTES:30}

# Inventory
inventory.low-stock-threshold=${INVENTORY_LOW_STOCK_THRESHOLD:5}

# Checkout
app.shipping.flat-rate=${SHIPPING_FLAT_RATE:25.00}
app.tax.rate=${TAX_RATE:0.00}

# Social OAuth2 (Google + Facebook)
# Set these via env vars — never commit real values.
oauth2.google.client-id=${GOOGLE_CLIENT_ID:}
oauth2.google.client-secret=${GOOGLE_CLIENT_SECRET:}
oauth2.google.redirect-uri=${GOOGLE_REDIRECT_URI:http://localhost:8080/api/v1/auth/social/google/callback}
oauth2.facebook.app-id=${FACEBOOK_APP_ID:}
oauth2.facebook.app-secret=${FACEBOOK_APP_SECRET:}
oauth2.facebook.redirect-uri=${FACEBOOK_REDIRECT_URI:http://localhost:8080/api/v1/auth/social/facebook/callback}

# RabbitMQ
spring.rabbitmq.host=${RABBITMQ_HOST:localhost}
spring.rabbitmq.port=${RABBITMQ_PORT:5672}
spring.rabbitmq.username=${RABBITMQ_USERNAME:myuser}
spring.rabbitmq.password=${RABBITMQ_PASSWORD:secret}

# Payment gateway stubs (set real keys to activate)
payment.stripe.secret-key=${STRIPE_SECRET_KEY:}
payment.paymob.api-key=${PAYMOB_API_KEY:}
payment.fawry.merchant-code=${FAWRY_MERCHANT_CODE:}
payment.fawry.security-key=${FAWRY_SECURITY_KEY:}

# MinIO Configuration
# MinIO server URL (running via Docker on port 9000)
minio.url=http://localhost:9000

# Credentials ? must match MINIO_ROOT_USER and MINIO_ROOT_PASSWORD in docker-compose.yml
minio.access-key=minioadmin
minio.secret-key=minioadmin

# Single bucket for all FlowMerce files
# Subfolders separate the different types (products/, stores/, profiles/, etc.)
minio.bucket-name=flowmerce