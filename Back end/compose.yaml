# Full FlowMerce compose — infra + backend + frontend.
#
# Quick start (development):
#   cp .env.example .env && vi .env   # fill DB_PASSWORD, JWT_SECRET, MAIL_PASSWORD, INTEGRATION_ENCRYPTION_KEY, MINIO_URL
#   docker compose up --build
#
# Services:
#   rabbitmq  :5672   — async notifications
#   redis     :6379   — stock cache + rate limits
#   backend   :8080   — Spring Boot /api/v1
#   frontend  :3000   — Next.js storefront + merchant dashboard
#
# MinIO is NOT run by this file — it runs on a separate host. Set MINIO_URL
# (and MINIO_ACCESS_KEY/MINIO_SECRET_KEY/MINIO_BUCKET if not using the
# minioadmin/minioadmin/flowmerce defaults) in .env to point at it.
#
# DB-1: No local postgres service — the backend always talks to the shared
# Supabase Postgres instance (same default as application.properties).
# Set DB_URL/DB_USERNAME/DB_PASSWORD in .env to point elsewhere.
# DOC-5: uploads volume persists images from before MinIO was wired up.
# DOC-6: healthchecks + depends_on ensure correct startup order.
# DOC-7: pinned image versions instead of :latest.

services:

  # ── Infrastructure ───────────────────────────────────────────────────────────

  rabbitmq:
    image: 'rabbitmq:3.13-management-alpine'
    environment:
      RABBITMQ_DEFAULT_USER: myuser
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-secret}
    ports:
      - '5672:5672'
      - '15672:15672'   # management UI
    healthcheck:
      test: ['CMD', 'rabbitmq-diagnostics', '-q', 'ping']
      interval: 15s
      timeout: 10s
      retries: 5

  redis:
    image: 'redis:7-alpine'
    ports:
      - '6379:6379'
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

  # MinIO object storage — stores product images, store logos,
  # invoices, profile pictures, notification attachments, and storefront assets.
  # NOT run by this compose file — MinIO runs on a separate host. Point the
  # backend at it via MINIO_URL / MINIO_ACCESS_KEY / MINIO_SECRET_KEY / MINIO_BUCKET
  # in .env (see .env.example).

  # ── Backend ──────────────────────────────────────────────────────────────────

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - '8080:8080'
    environment:
      # DB-1: defaults to the shared Supabase instance via the Supavisor session
      # pooler — same fallback as application.properties. The direct
      # db.<ref>.supabase.co host is IPv6-only, which Docker can't route to.
      # Override via .env for a different DB.
      DB_URL:          ${DB_URL:-jdbc:postgresql://aws-0-eu-west-1.pooler.supabase.com:5432/postgres}
      DB_USERNAME:     ${DB_USERNAME:-postgres.jyzpcvosismwilptumpp}
      DB_PASSWORD:     ${DB_PASSWORD}
      JWT_SECRET:      ${JWT_SECRET}
      MAIL_PASSWORD:   ${MAIL_PASSWORD}
      INTEGRATION_ENCRYPTION_KEY: ${INTEGRATION_ENCRYPTION_KEY}
      MAIL_USERNAME:   ${MAIL_USERNAME:-ka.mahrous@gmail.com}
      REDIS_HOST:      redis
      REDIS_PORT:      6379
      RABBITMQ_HOST:   rabbitmq
      RABBITMQ_PORT:   5672
      RABBITMQ_USERNAME: myuser
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD:-secret}
      # MinIO — runs on a separate host, not in this compose file. MINIO_URL must
      # point at wherever it's actually reachable from this container.
      MINIO_URL:        ${MINIO_URL}
      # DOC-6: an empty string here would override application.properties'
      # "fall back to MINIO_URL" default with a blank value instead — nest the
      # fallback in the compose expression itself so an unset MINIO_PUBLIC_URL
      # resolves to MINIO_URL, never to "".
      MINIO_PUBLIC_URL: ${MINIO_PUBLIC_URL:-${MINIO_URL}}
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-minioadmin}
      MINIO_BUCKET:     ${MINIO_BUCKET:-flowmerce}
      UPLOAD_DIR:      /app/uploads
      # Override frontend URL for email activation links
      FRONTEND_URL:    ${FRONTEND_URL:-http://localhost:3000}
      ADMIN_EMAIL:     ${ADMIN_EMAIL:-admin@flowmerce.com}
      ADMIN_PASSWORD:  ${ADMIN_PASSWORD:-ChangeMe!2026}
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-default}
      # Social OAuth2 — must be forwarded explicitly; compose does not
      # auto-inject .env keys into the container, only ones listed here.
      # Redirect URIs fall back to the same localhost default as
      # application.properties — an empty string here would override that
      # default with a blank value instead of falling back to it.
      GOOGLE_CLIENT_ID:      ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET:  ${GOOGLE_CLIENT_SECRET:-}
      GOOGLE_REDIRECT_URI:   ${GOOGLE_REDIRECT_URI:-http://localhost:8080/api/v1/auth/social/google/callback}
      FACEBOOK_APP_ID:       ${FACEBOOK_APP_ID:-}
      FACEBOOK_APP_SECRET:   ${FACEBOOK_APP_SECRET:-}
      FACEBOOK_REDIRECT_URI: ${FACEBOOK_REDIRECT_URI:-http://localhost:8080/api/v1/auth/social/facebook/callback}
    volumes:
      - uploads:/app/uploads                   # DOC-5: persist uploaded images
    depends_on:
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ['CMD-SHELL', 'curl -sf http://localhost:8080/api/v1/actuator/health || exit 1']
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  # ── Frontend ─────────────────────────────────────────────────────────────────

  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
      args:
        # NEXT_PUBLIC_* baked in at build time
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8080/api/v1}
    ports:
      - '3000:3000'
    environment:
      GROQ_API_KEY: ${GROQ_API_KEY:-}
    depends_on:
      backend:
        condition: service_healthy

# ── Volumes ───────────────────────────────────────────────────────────────────
volumes:
  uploads:     # DOC-5: local uploads fallback (pre-MinIO files still served from here)