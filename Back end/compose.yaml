# Full FlowMerce compose — infra + backend + frontend.
#
# Quick start (development):
#   cp .env.example .env && vi .env   # fill DB_PASSWORD, JWT_SECRET, MAIL_PASSWORD, INTEGRATION_ENCRYPTION_KEY
#   docker compose up --build
#
# Services:
#   rabbitmq  :5672   — async notifications
#   redis     :6379   — stock cache + rate limits
#   minio     :9000   — object storage for images, PDFs, attachments
#   minio     :9001   — MinIO web console (browser)
#   backend   :8080   — Spring Boot /api/v1
#   frontend  :3000   — Next.js storefront + merchant dashboard
#
# DB-1: No local postgres service — the backend always talks to the shared
# Supabase Postgres instance (same default as application.properties).
# Set DB_URL/DB_USERNAME/DB_PASSWORD in .env to point elsewhere.
# DOC-5: uploads volume persists merchant-uploaded images.
# DOC-6: healthchecks + depends_on ensure correct startup order.
# DOC-7: pinned image versions instead of :latest.

services:

  # ── Infrastructure ───────────────────────────────────────────────────────────

  rabbitmq:
    image: 'rabbitmq:3.13-management-alpine'
    environment:
      RABBITMQ_DEFAULT_USER: myuser
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-secret}
    ports:
      - '5672:5672'
      - '15672:15672'   # management UI
    healthcheck:
      test: ['CMD', 'rabbitmq-diagnostics', '-q', 'ping']
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 90s

  redis:
    image: 'redis:7-alpine'
    ports:
      - '6379:6379'
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: 'minio/minio:latest'
    ports:
      - '9000:9000'   # API — Spring Boot connects here
      - '9001:9001'   # Web console — open in browser
    environment:
      MINIO_ROOT_USER:     ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-minioadmin}
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:9000/minio/health/live']
      interval: 15s
      timeout: 5s
      retries: 5

  # ── Backend ──────────────────────────────────────────────────────────────────

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - '8080:8080'
    environment:
      DB_URL:          ${DB_URL:-jdbc:postgresql://aws-0-eu-west-1.pooler.supabase.com:5432/postgres}
      DB_USERNAME:     ${DB_USERNAME:-postgres.jyzpcvosismwilptumpp}
      DB_PASSWORD:     ${DB_PASSWORD}
      JWT_SECRET:      ${JWT_SECRET}
      MAIL_PASSWORD:   ${MAIL_PASSWORD}
      INTEGRATION_ENCRYPTION_KEY: ${INTEGRATION_ENCRYPTION_KEY}
      MAIL_USERNAME:   ${MAIL_USERNAME:-ka.mahrous@gmail.com}
      REDIS_HOST:      redis
      REDIS_PORT:      6379
      RABBITMQ_HOST:   rabbitmq
      RABBITMQ_PORT:   5672
      RABBITMQ_USERNAME: myuser
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD:-secret}
      MINIO_URL:        http://minio:9000
      MINIO_PUBLIC_URL: ${MINIO_PUBLIC_URL:-https://media.flowmerce.tech}
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-minioadmin}
      MINIO_BUCKET:     flowmerce
      UPLOAD_DIR:      /app/uploads
      FRONTEND_URL:    ${FRONTEND_URL:-http://localhost:3000}
      ADMIN_EMAIL:     ${ADMIN_EMAIL:-admin@flowmerce.com}
      ADMIN_PASSWORD:  ${ADMIN_PASSWORD:-ChangeMe!2026}
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-default}
      GOOGLE_CLIENT_ID:      ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET:  ${GOOGLE_CLIENT_SECRET:-}
      GOOGLE_REDIRECT_URI:   ${GOOGLE_REDIRECT_URI:-http://localhost:8080/api/v1/auth/social/google/callback}
      FACEBOOK_APP_ID:       ${FACEBOOK_APP_ID:-}
      FACEBOOK_APP_SECRET:   ${FACEBOOK_APP_SECRET:-}
      FACEBOOK_REDIRECT_URI: ${FACEBOOK_REDIRECT_URI:-http://localhost:8080/api/v1/auth/social/facebook/callback}
    volumes:
      - uploads:/app/uploads
    depends_on:
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    healthcheck:
      test: ['CMD-SHELL', 'curl -sf http://localhost:8080/api/v1/actuator/health || exit 1']
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  # ── Frontend ─────────────────────────────────────────────────────────────────

  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8080/api/v1}
    ports:
      - '3000:3000'
    environment:
      GROQ_API_KEY: ${GROQ_API_KEY:-}
    depends_on:
      backend:
        condition: service_healthy

# ── Volumes ───────────────────────────────────────────────────────────────────
volumes:
  uploads:
  minio_data: