# Full FlowMerce compose — infra + backend + frontend.
#
# Quick start (development):
#   cp .env.example .env && vi .env   # fill DB_PASSWORD, JWT_SECRET, MAIL_PASSWORD
#   docker compose up --build
#
# Services:
#   postgres  :5432   — relational DB (named volume: pgdata)
#   rabbitmq  :5672   — async notifications
#   redis     :6379   — stock cache + rate limits
#   minio     :9000   — object storage for images, PDFs, attachments
#   minio     :9001   — MinIO web console (browser)
#   backend   :8080   — Spring Boot /api/v1
#   frontend  :3000   — Next.js storefront + merchant dashboard
#
# DOC-3: DB host is now the service name "postgres", not localhost.
# DOC-4: pgdata volume prevents data loss on compose down.
# DOC-5: uploads volume persists merchant-uploaded images.
# DOC-6: healthchecks + depends_on ensure correct startup order.
# DOC-7: pinned image versions instead of :latest.

services:

  # ── Infrastructure ───────────────────────────────────────────────────────────

  postgres:
    image: 'postgres:16-alpine'
    environment:
      POSTGRES_DB:       mydatabase
      POSTGRES_USER:     myuser
      POSTGRES_PASSWORD: ${DB_PASSWORD:-secret}
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data        # DOC-4: persist DB data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U myuser -d mydatabase']
      interval: 10s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: 'rabbitmq:3.13-management-alpine'
    environment:
      RABBITMQ_DEFAULT_USER: myuser
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-secret}
    ports:
      - '5672:5672'
      - '15672:15672'   # management UI
    healthcheck:
      test: ['CMD', 'rabbitmq-diagnostics', '-q', 'ping']
      interval: 15s
      timeout: 10s
      retries: 5

  redis:
    image: 'redis:7-alpine'
    ports:
      - '6379:6379'
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

  # MinIO object storage — stores product images, store logos,
  # invoices, profile pictures, notification attachments, and storefront assets.
  # Open http://localhost:9001 in browser to manage files visually.
  minio:
    image: 'minio/minio:latest'
    ports:
      - '9000:9000'   # API — Spring Boot connects here
      - '9001:9001'   # Web console — open in browser
    environment:
      MINIO_ROOT_USER:     ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-minioadmin}
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data                       # persist uploaded files
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:9000/minio/health/live']
      interval: 15s
      timeout: 5s
      retries: 5

  # ── Backend ──────────────────────────────────────────────────────────────────

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - '8080:8080'
    environment:
      # DOC-3: use service names, not localhost
      DB_URL:          jdbc:postgresql://postgres:5432/mydatabase
      DB_USERNAME:     myuser
      DB_PASSWORD:     ${DB_PASSWORD:-secret}
      JWT_SECRET:      ${JWT_SECRET}
      MAIL_PASSWORD:   ${MAIL_PASSWORD}
      MAIL_USERNAME:   ${MAIL_USERNAME:-ka.mahrous@gmail.com}
      REDIS_HOST:      redis
      REDIS_PORT:      6379
      RABBITMQ_HOST:   rabbitmq
      RABBITMQ_PORT:   5672
      RABBITMQ_USERNAME: myuser
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD:-secret}
      # MinIO — use service name "minio" not localhost inside Docker
      MINIO_URL:        http://minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-minioadmin}
      MINIO_BUCKET:     flowmerce
      UPLOAD_DIR:      /app/uploads
      # Override frontend URL for email activation links
      FRONTEND_URL:    ${FRONTEND_URL:-http://localhost:3000}
      ADMIN_EMAIL:     ${ADMIN_EMAIL:-admin@flowmerce.com}
      ADMIN_PASSWORD:  ${ADMIN_PASSWORD:-ChangeMe!2026}
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-default}
    volumes:
      - uploads:/app/uploads                   # DOC-5: persist uploaded images
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    healthcheck:
      test: ['CMD-SHELL', 'curl -sf http://localhost:8080/api/v1/actuator/health || exit 1']
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  # ── Frontend ─────────────────────────────────────────────────────────────────

  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
      args:
        # NEXT_PUBLIC_* baked in at build time
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8080/api/v1}
    ports:
      - '3000:3000'
    environment:
      GROQ_API_KEY: ${GROQ_API_KEY:-}
    depends_on:
      backend:
        condition: service_healthy

# ── Volumes ───────────────────────────────────────────────────────────────────
volumes:
  pgdata:      # DOC-4: postgres data
  uploads:     # DOC-5: local uploads fallback
  minio_data:  # MinIO object storage data