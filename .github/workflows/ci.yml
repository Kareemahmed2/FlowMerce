name: FlowMerce CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  # ── Job 1: Backend Build & Test ──────────────────────────────────────────────
  backend:
    name: Backend Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Build & Test Backend
        working-directory: "Back end"
        env:
          DB_PASSWORD: dummy
          JWT_SECRET: dummy-secret-for-ci-only-not-real
          MAIL_PASSWORD: dummy
          INTEGRATION_ENCRYPTION_KEY: I9Dpyy5v5ErZ3gFlsxbx2g7vs6Vq8fPmId3L0fM5CKs=
        run: |
          chmod +x mvnw
          ./mvnw -q -DskipTests package

  # ── Job 2: Frontend Build ─────────────────────────────────────────────────────
  frontend:
    name: Frontend Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Build Frontend
        working-directory: frontend
        env:
          NEXT_PUBLIC_API_URL: https://api.flowmerce.tech/api/v1
        run: npm run build

  # ── Job 3: Docker Compose Validate ───────────────────────────────────────────
  docker-validate:
    name: Docker Compose Validate
    runs-on: ubuntu-latest
    needs: [backend, frontend]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Validate Docker Compose
        working-directory: "Back end"
        env:
          DB_PASSWORD: dummy
          JWT_SECRET: dummy-secret-for-ci-only-not-real
          MAIL_PASSWORD: dummy
          INTEGRATION_ENCRYPTION_KEY: I9Dpyy5v5ErZ3gFlsxbx2g7vs6Vq8fPmId3L0fM5CKs=
        run: docker compose config